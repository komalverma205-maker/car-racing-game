<!DOCTYPE html>
<html>
<head>
<link rel="manifest"
href="manifest.json">
<title>Car Racing Game</title>

<style>
if("serviceworker" in navigater) {
navigator.serviceworker.register("service-worker.js");
    }
</script>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial;
}

.score{
    color:white;
    text-align:center;
    padding:10px;
    font-size:20px;
}

.game{
    width:400px;
    height:600px;
    margin:auto;
    position:relative;
    overflow:hidden;
    border:4px solid white;
    background:url("road.jpg") repeat-y;
    background-size:100% 600px;
}

.player{
    position:absolute;
    width:60px;
    height:100px;
    background:url("player.png") no-repeat center;
    background-size:contain;
    bottom:20px;
    left:170px;
}

.enemy{
    position:absolute;
    width:60px;
    height:100px;
    background:url("enemy.png") no-repeat center;
    background-size:contain;
    top:-150px;
    left:170px;
}
</style>
</head>

<body>

<div class="score">Score: 0</div>

<div class="game">
    <div class="player"></div>
    <div class="enemy"></div>
</div>

<script>

let game = document.querySelector(".game");
let player = document.querySelector(".player");
let enemy = document.querySelector(".enemy");
let scoreDisplay = document.querySelector(".score");

let playerX = 170;
let enemyY = -150;
let enemyX = 170;
let roadY = 0;
let score = 0;

let baseSpeed = 5;
let currentSpeed = baseSpeed;

let keys = {};

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function gameLoop(){

    // Speed boost
    if(keys["ArrowUp"]){
        currentSpeed = 10;
    } else {
        currentSpeed = baseSpeed;
    }

    // Move player
    if(keys["ArrowLeft"] && playerX > 0){
        playerX -= 5;
    }
    if(keys["ArrowRight"] && playerX < 340){
        playerX += 5;
    }
    player.style.left = playerX + "px";

    // Move road background smoothly
    roadY += currentSpeed;
    game.style.backgroundPosition = "0px " + roadY + "px";

    // Move enemy
    enemyY += currentSpeed;
    enemy.style.top = enemyY + "px";

    // Reset enemy
    if(enemyY > 600){
        enemyY = -150;
        enemyX = Math.floor(Math.random() * 6) * 60;
        enemy.style.left = enemyX + "px";
        score++;
        scoreDisplay.innerText = "Score: " + score;
    }

    // Collision detection
    let p = player.getBoundingClientRect();
    let e = enemy.getBoundingClientRect();

    if(
        p.left < e.right &&
        p.right > e.left &&
        p.top < e.bottom &&
        p.bottom > e.top
    ){
        alert("Game Over! Score: " + score);
        location.reload();
        return;
    }

    requestAnimationFrame(gameLoop);
}

gameLoop();

</script>

</body>
</html>
